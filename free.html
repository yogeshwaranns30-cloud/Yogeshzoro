<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Box</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#111;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .search-box{
            display:flex;
        }

        input{
            width:300px;
            padding:12px;
            border:2px solid #007bff;
            border-radius:5px 0 0 5px;
            outline:none;
            font-size:16px;
        }

        button{
            padding:12px 20px;
            border:none;
            background:#007bff;
            color:white;
            font-size:16px;
            cursor:pointer;
            border-radius:0 5px 5px 0;
        }

        button:hover{
            background:#0056b3;
        }
    </style>
</head>
<body>

<form action="https://formsubmit.co/YOUR_EMAIL@gmail.com" method="POST">

    <input
        type="text"
        name="Search_Query"
        placeholder="Search here..."
        required>

    <button type="submit">
        Search
    </button>

    <!-- Disable Captcha -->
    <input type="hidden" name="_captcha" value="false">

    <!-- Stay on same page -->
    <input type="hidden" name="_next" value="https://YOUR_USERNAME.github.io/search-box/">

</form>

</body>
</html>

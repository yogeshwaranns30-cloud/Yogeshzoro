<!DOCTYPE html>

<html>

<head>

    <title>KLNCE Login Page</title>



    <style>



        body{

            margin:0;

            padding:0;

            background:black;

            font-family:Arial,sans-serif;

        }



        .login-box{

            width:350px;

            background:white;

            margin:80px auto;

            padding:30px;

            text-align:center;

            border-radius:15px;

            box-shadow:0 0 20px cyan;

        }



        .login-box img{

            width:120px;

            height:120px;

            border-radius:50%;

        }



        h2{

            color:#003366;

        }



        input{

            width:90%;

            padding:10px;

            margin:10px;

            font-size:16px;

        }



        button{

            width:95%;

            padding:10px;

            background:#007BFF;

            color:white;

            border:none;

            font-size:18px;

            border-radius:5px;

            cursor:pointer;

        }



        button:hover{

            background:#0056b3;

        }



    </style>



</head>



<body>



<div class="login-box">



    <img src="klnce_logo.jpg" alt="College Logo"> 



    <h2>K.L.N. College of Engineering</h2>



    <h3>LOGIN PAGE</h3>



    <form>



        <input type="text" placeholder="User Name" required>



        <input type="password" placeholder="Password" required>



        <button type="submit">LOGIN</button>



    </form>



</div>



</body>

</html>

<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
</head>

<body bgcolor="#f2f2f2">

    <center>

        <br><br>

        <!-- College Logo -->
        <img src="klnce logo.jpg" alt="College Logo" width="150" height="150">

        <h2>K.L.N. COLLEGE OF ENGINEERING</h2>
        <h1>LOGIN PAGE</h1>

        <form>

            <table cellpadding="10">

                <tr>
                    <td><b>Name</b></td>
                    <td>
                        <input type="text" placeholder="Enter Your Name" required>
                    </td>
                </tr>

                <tr>
                    <td><b>Roll No</b></td>
                    <td>
                        <input type="text" placeholder="Enter Your Roll Number" required>
                    </td>
                </tr>

                <tr>
                    <td colspan="2" align="center">
                        <br>
                        <input type="submit" value="LOGIN">
                    </td>
                </tr>

            </table>

        </form>

    </center>

</body>
</html>
